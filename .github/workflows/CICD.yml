name: CICD for Springboot Application

on:
  push:
    paths:
      - "k8s/**"

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Setup JDK 26
        uses: actions/setup-java@v2
        with:
          java-version: '26'
          distribution: 'adopt'
      - name: Build with Maven
        run: mvn clean install
      - name: Login to ACR
        run: az acr login --name AZURE_CONTAINER_REGISTRY_NAME
      - name: Build and Push Docker Image
        run: |
          docker build -t AZURE_CONTAINER_REGISTRY_NAME.azurecr.io/springbootapp:{{ github.sha }} .
          docker push AZURE_CONTAINER_REGISTRY_NAME.azurecr.io/springbootapp:{{ github.sha }}
  

  Deploy-to-Azure-Web-App:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: AZURE_APP_SERVICE_NAME
          images: AZURE_CONTAINER_REGISTRY_NAME.azurecr.io/springbootapp:{{ github.sha }}
          registry-url: AZURE_CONTAINER_REGISTRY_NAME.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}


  Deploy-to-AKS:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Set AKS Context
        run: az aks get-credentials --resource-group AZURE_RESOURCE_GROUP --name AZURE_AKS_CLUSTER_NAME
      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/springapp.yml
           



