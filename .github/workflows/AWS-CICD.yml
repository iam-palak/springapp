name: CICD with AWS

on:
  push:
    branches:
      - aws

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17.0.7+7'
          distribution: 'temurin'
      
        
