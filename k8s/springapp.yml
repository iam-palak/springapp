apiVersion: apps/v1
kind: Deployment
metadata:
  name: sprintboot-deployment
  labels:
    app: springbootapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: springbootapp
  template:
    metadata:
      labels:
        app: springbootapp
    spec:
      containers:
        - name: springapp
          image: AZURE_CONTAINER_REGISTRY_NAME.azurecr.io/springbootapp:${{ github.sha }}
          ports:
            - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: springbootapp-service
spec:
  type: LoadBalancer
  selector:
    app: springbootapp
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082